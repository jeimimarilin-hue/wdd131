<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Jeimi Diaz Mariani">
    <meta name="description" content="Complete the W05 Product Review Form for WDD 131. Provide your feedback on products to help us improve our services and product quality.">
    <title>Product Review Form | WDD 131</title>
    <link rel="stylesheet" href="styles/form.css">
</head>
<body>
    <header>
        <h1>Product Review</h1>
    </header>
    <main>
        <div class="form-container">
            <form action="review.html" method="get">
                <label for="product-select">Product Name *</label>
                <select id="product-select" name="product" required>
                    <option value="" disabled selected>Select a product...</option>
                </select>

                <fieldset>
                    <legend>Rating</legend>
                    <label for="r1"><input type="radio" id="r1" name="rating" value="1" required> 1 Star</label>
                    <label for="r2"><input type="radio" id="r2" name="rating" value="2" required> 2 Stars</label>
                    <label for="r3"><input type="radio" id="r3" name="rating" value="3" required> 3 Stars</label>
                    <label for="r4"><input type="radio" id="r4" name="rating" value="4" required> 4 Stars</label>
                    <label for="r5"><input type="radio" id="r5" name="rating" value="5" required> 5 Stars</label>
                </fieldset>

                <label for="install-date">Date of Installation *</label>
                <input type="date" id="install-date" name="date" required>

                <fieldset>
                    <legend>Features</legend>
                    <label for="f1"><input type="checkbox" id="f1" name="features" value="durability"> Durability</label>
                    <label for="f2"><input type="checkbox" id="f2" name="features" value="ease"> Ease of Use</label>
                    <label for="f3"><input type="checkbox" id="f3" name="features" value="price"> Price</label>
                    <label for="f4"><input type="checkbox" id="f4" name="features" value="quality"> Quality</label>
                </fieldset>

                <label for="comments">Comments</label>
                <textarea id="comments" name="comments" rows="4"></textarea>

                <button type="submit">Post Review</button>
            </form>
        </div>
    </main>
    <footer>
        <p>© 2026 WDD 131 | Product Review Assignment</p>
    </footer>
<script src="scripts/form.js" defer></script></body>
</html>
